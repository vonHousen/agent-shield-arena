<?xml version="1.0" encoding="UTF-8"?>
<svg width="960" height="720" viewBox="0 0 960 720" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">

  <!-- Defs -->
  <defs>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f87171"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#60a5fa"/>
    </marker>
    <marker id="arrow-amber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fbbf24"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34d399"/>
    </marker>
    <marker id="arrow-pink" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fb7185"/>
    </marker>
    <marker id="arrow-cyan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#67e8f9"/>
    </marker>
    <marker id="arrow-gray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>

    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.4"/>
    </filter>

    <linearGradient id="grad-attack" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#dc2626"/><stop offset="100%" stop-color="#991b1b"/>
    </linearGradient>
    <linearGradient id="grad-defender" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb"/><stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="grad-shielded" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/><stop offset="100%" stop-color="#4338ca"/>
    </linearGradient>
    <linearGradient id="grad-eval" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d97706"/><stop offset="100%" stop-color="#92400e"/>
    </linearGradient>
    <linearGradient id="grad-triage" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#059669"/><stop offset="100%" stop-color="#065f46"/>
    </linearGradient>
    <linearGradient id="grad-amem" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#be123c"/><stop offset="100%" stop-color="#881337"/>
    </linearGradient>
    <linearGradient id="grad-dmem" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e40af"/><stop offset="100%" stop-color="#1e3a5f"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="960" height="720" fill="#0f1117"/>

  <!-- Title -->
  <text x="480" y="36" text-anchor="middle" fill="#64748b" font-size="12" letter-spacing="2" text-transform="uppercase">AGENTSHIELD ARENA</text>

  <!-- ═══════════ ARROWS (drawn behind nodes) ═══════════ -->

  <!-- Attack Agent → Protected System box -->
  <path d="M 480 120 L 480 168" stroke="#f87171" stroke-width="2.5" fill="none" marker-end="url(#arrow-red)"/>

  <!-- Defender → Shielded System (right to left) -->
  <path d="M 530 235 L 430 235" stroke="#60a5fa" stroke-width="2.5" fill="none" marker-end="url(#arrow-blue)"/>

  <!-- Protected System → Evaluator -->
  <path d="M 480 290 L 480 360" stroke="#fbbf24" stroke-width="2.5" fill="none" marker-end="url(#arrow-amber)"/>

  <!-- Evaluator → Triage Agent -->
  <path d="M 480 430 L 480 490" stroke="#34d399" stroke-width="2.5" fill="none" marker-end="url(#arrow-green)"/>

  <!-- Triage → Defender Memory (right) -->
  <path d="M 545 530 L 660 590" stroke="#67e8f9" stroke-width="2.5" fill="none" marker-end="url(#arrow-cyan)"/>

  <!-- Triage → Shielded System (left, code fix — unimplemented) -->
  <path d="M 415 530 C 300 530, 260 490, 260 400 C 260 310, 260 270, 330 260" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4 4" fill="none" marker-end="url(#arrow-gray)" opacity="0.6"/>

  <!-- Evaluator → Attack Memory (left, all verdicts) -->
  <path d="M 415 410 L 300 590" stroke="#fb7185" stroke-width="2.5" fill="none" marker-end="url(#arrow-pink)"/>

  <!-- Attack Memory → Attack Agent (feedback, left side) -->
  <path d="M 210 610 C 80 610, 80 90, 420 90" stroke="#fb7185" stroke-width="2" stroke-dasharray="6 4" fill="none" marker-end="url(#arrow-pink)" opacity="0.8"/>

  <!-- Defender Memory → Defender (feedback, right side) -->
  <path d="M 750 610 C 880 610, 880 195, 650 215" stroke="#67e8f9" stroke-width="2" stroke-dasharray="6 4" fill="none" marker-end="url(#arrow-cyan)" opacity="0.8"/>

  <!-- ═══════════ PROTECTED SYSTEM BOX ═══════════ -->
  <rect x="290" y="175" width="380" height="110" rx="14" fill="none" stroke="#475569" stroke-width="1.5" stroke-dasharray="8 4"/>
  <text x="310" y="192" fill="#94a3b8" font-size="10" letter-spacing="1">PROTECTED SYSTEM</text>

  <!-- ═══════════ NODES ═══════════ -->

  <!-- Attack Agent -->
  <g filter="url(#shadow)">
    <rect x="380" y="56" width="200" height="60" rx="12" fill="url(#grad-attack)" stroke="#f87171" stroke-width="1.5"/>
    <text x="480" y="82" text-anchor="middle" fill="white" font-size="15" font-weight="700">Attack Agent</text>
    <text x="480" y="102" text-anchor="middle" fill="#fecaca" font-size="11">Adversarial probes (black-box)</text>
  </g>

  <!-- Shielded System (left) -->
  <g filter="url(#shadow)">
    <rect x="310" y="205" width="120" height="56" rx="10" fill="url(#grad-shielded)" stroke="#a5b4fc" stroke-width="1.5"/>
    <text x="370" y="230" text-anchor="middle" fill="white" font-size="13" font-weight="700">Shielded System</text>
    <text x="370" y="248" text-anchor="middle" fill="#c7d2fe" font-size="10">Support agent</text>
  </g>

  <!-- Defender (right) -->
  <g filter="url(#shadow)">
    <rect x="530" y="205" width="120" height="56" rx="10" fill="url(#grad-defender)" stroke="#60a5fa" stroke-width="1.5"/>
    <text x="590" y="230" text-anchor="middle" fill="white" font-size="14" font-weight="700">Defender</text>
    <text x="590" y="248" text-anchor="middle" fill="#bfdbfe" font-size="10">Input + tool filter</text>
  </g>

  <!-- Evaluator -->
  <g filter="url(#shadow)">
    <rect x="380" y="365" width="200" height="60" rx="12" fill="url(#grad-eval)" stroke="#fbbf24" stroke-width="1.5"/>
    <text x="480" y="392" text-anchor="middle" fill="white" font-size="15" font-weight="700">Evaluator</text>
    <text x="480" y="412" text-anchor="middle" fill="#fef3c7" font-size="11">LLM Judge — BREACHED / DEFENDED</text>
  </g>

  <!-- Triage Agent -->
  <g filter="url(#shadow)">
    <rect x="390" y="495" width="180" height="60" rx="12" fill="url(#grad-triage)" stroke="#34d399" stroke-width="1.5"/>
    <text x="480" y="522" text-anchor="middle" fill="white" font-size="15" font-weight="700">Triage Agent</text>
    <text x="480" y="542" text-anchor="middle" fill="#a7f3d0" font-size="11">Routes: memory or code fix</text>
  </g>

  <!-- Attack Memory -->
  <g filter="url(#shadow)">
    <rect x="180" y="595" width="180" height="60" rx="12" fill="url(#grad-amem)" stroke="#fb7185" stroke-width="1.5"/>
    <text x="270" y="622" text-anchor="middle" fill="white" font-size="14" font-weight="700">Attack Memory</text>
    <text x="270" y="642" text-anchor="middle" fill="#fecdd3" font-size="11">Tactical reflections</text>
  </g>

  <!-- Defender Memory -->
  <g filter="url(#shadow)">
    <rect x="600" y="595" width="180" height="60" rx="12" fill="url(#grad-dmem)" stroke="#93c5fd" stroke-width="1.5"/>
    <text x="690" y="622" text-anchor="middle" fill="white" font-size="14" font-weight="700">Defender Memory</text>
    <text x="690" y="642" text-anchor="middle" fill="#bfdbfe" font-size="11">Learned exploit patterns</text>
  </g>

  <!-- ═══════════ EDGE LABELS ═══════════ -->
  <text x="496" y="150" fill="#f87171" font-size="11" font-weight="500">probes</text>
  <text x="460" y="250" fill="#60a5fa" font-size="10" font-weight="500">filters</text>
  <text x="496" y="335" fill="#fbbf24" font-size="11" font-weight="500">trace</text>
  <text x="496" y="478" fill="#34d399" font-size="11" font-weight="500">success</text>
  <text x="325" y="520" fill="#fb7185" font-size="11" font-weight="500">all verdicts</text>
  <text x="590" y="565" fill="#67e8f9" font-size="11" font-weight="500">pattern fix</text>
  <text x="215" y="400" fill="#94a3b8" font-size="10" font-weight="500" opacity="0.7">code fix</text>
  <text x="200" y="415" fill="#94a3b8" font-size="9" font-style="italic" opacity="0.6">(unimplemented)</text>

  <!-- Feedback labels on curves -->
  <text x="95" y="380" fill="#fb7185" font-size="10" font-weight="500" opacity="0.9">tactical</text>
  <text x="82" y="395" fill="#fb7185" font-size="10" font-weight="500" opacity="0.9">reflections</text>
  <text x="830" y="380" fill="#67e8f9" font-size="10" font-weight="500" opacity="0.9">learned</text>
  <text x="832" y="395" fill="#67e8f9" font-size="10" font-weight="500" opacity="0.9">patterns</text>

  <!-- ═══════════ BOTTOM ANNOTATION ═══════════ -->
  <text x="480" y="695" text-anchor="middle" fill="#475569" font-size="12" font-style="italic">Each round: attacks get smarter AND defenses get stronger</text>

</svg>
