<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AgentShield Arena</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/styles.css?v=7" />
  </head>
  <body class="flex h-full flex-col overflow-hidden bg-zinc-950 text-zinc-100">
    <header class="shrink-0 border-b border-zinc-800 bg-zinc-950/95">
      <div class="mx-auto flex max-w-7xl items-center justify-between gap-4 px-5 py-4">
        <div>
          <h1 class="text-lg font-semibold tracking-normal text-white">AgentShield Arena</h1>
          <p class="text-sm text-zinc-400">Real-time attack & defense monitoring</p>
        </div>
        <div class="flex items-center gap-3">
          <select
            id="runSelector"
            class="rounded border border-zinc-700 bg-zinc-900 px-3 py-1 text-sm text-zinc-300 focus:border-zinc-500 focus:outline-none"
          >
            <option value="latest">Latest (Live)</option>
          </select>
          <span id="statusBadge" class="rounded-full border border-zinc-700 px-3 py-1 text-sm text-zinc-300">Idle</span>
        </div>
      </div>
    </header>

    <main class="mx-auto grid min-h-0 w-full max-w-7xl flex-1 gap-4 px-5 py-5 lg:grid-cols-[minmax(0,3fr)_minmax(320px,2fr)]">
      <section class="flex min-h-0 flex-col overflow-hidden border border-zinc-800 bg-zinc-900">
        <div class="flex shrink-0 items-center justify-between border-b border-zinc-800 px-4 py-3">
          <div>
            <h2 class="text-sm font-semibold uppercase tracking-wide text-zinc-300">Conversation</h2>
            <p id="headerSummary" class="text-sm text-zinc-500">0 events</p>
          </div>
          <button
            id="scrollButton"
            class="hidden rounded border border-zinc-700 px-3 py-1 text-sm text-zinc-300 hover:bg-zinc-800"
            type="button"
          >
            Latest
          </button>
        </div>
        <nav id="roundSelector" class="round-selector shrink-0 border-b border-zinc-800 px-4">
        </nav>
        <nav id="scenarioTabs" class="scenario-tabs shrink-0 border-b border-zinc-800 px-4">
        </nav>
        <div id="conversation" class="conversation-scroll flex min-h-0 flex-1 flex-col gap-3 overflow-y-auto p-4">
          <div id="emptyState" class="flex h-full items-center justify-center text-sm text-zinc-500">
            Waiting for arena events
          </div>
        </div>
      </section>

      <aside class="flex min-h-0 flex-col gap-4 overflow-y-auto">
        <section class="shrink-0 border border-zinc-800 bg-zinc-900 p-4">
          <h2 class="text-sm font-semibold uppercase tracking-wide text-zinc-300">Arena Progress</h2>
          <div class="mt-4 grid grid-cols-3 gap-3 text-sm">
            <div>
              <p class="text-zinc-500">Rounds</p>
              <p id="roundMetric" class="mt-1 text-2xl font-semibold tabular-nums">0</p>
            </div>
            <div>
              <p class="text-zinc-500">Scenarios</p>
              <p id="scenarioMetric" class="mt-1 text-2xl font-semibold tabular-nums">0</p>
            </div>
            <div>
              <p class="text-zinc-500">Blocks</p>
              <p id="blockMetric" class="mt-1 text-2xl font-semibold tabular-nums">0</p>
            </div>
          </div>
        </section>

        <section id="roundComparisonCard" class="hidden shrink-0 border border-zinc-800 bg-zinc-900 p-4">
          <h2 class="text-sm font-semibold uppercase tracking-wide text-zinc-300">Round Comparison</h2>
          <div id="roundComparison" class="mt-4 flex flex-col gap-3 text-sm"></div>
        </section>

        <section id="adaptationCard" class="hidden shrink-0 border border-zinc-800 bg-zinc-900 p-4">
          <h2 class="text-sm font-semibold uppercase tracking-wide text-zinc-300">Attack Adaptation</h2>
          <div id="adaptationContent" class="mt-4 flex flex-col gap-0 text-sm"></div>
        </section>

        <section id="defenderAdaptationCard" class="hidden shrink-0 border border-zinc-800 bg-zinc-900 p-4">
          <h2 class="text-sm font-semibold uppercase tracking-wide text-zinc-300">Defender Adaptation</h2>
          <div id="defenderAdaptationContent" class="mt-4 flex flex-col gap-0 text-sm"></div>
        </section>

        <section class="shrink-0 border border-zinc-800 bg-zinc-900 p-4">
          <h2 class="text-sm font-semibold uppercase tracking-wide text-zinc-300">Evaluation Verdict</h2>
          <div id="verdictCard" class="mt-4 text-sm text-zinc-500">No verdict yet</div>
        </section>

      </aside>
    </main>

    <script src="/static/app.js?v=7"></script>
  </body>
</html>
